# ========== SmartFleet 应用配置 ==========
spring:
  application:
    name: SmartFleet
  profiles:
    active: local

server:
  port: 8080

# ========== MySQL 数据源 ==========
spring.datasource:
  driver-class-name: com.mysql.cj.jdbc.Driver
  url: jdbc:mysql://localhost:3306/smartfleet?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true

# ========== MyBatis-Plus 配置 ==========
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ========== Redis 配置 ==========
spring.data.redis:
  database: 0
  timeout: 3000ms

# ========== RocketMQ 配置 ==========
rocketmq:
  producer:
    send-message-timeout: 3000
    retry-times-when-send-failed: 2

# ========== JWT 配置 ==========
jwt:
  # Base64 编码的密钥（至少 256 位）
  # ⚠️ 必须通过环境变量 JWT_SECRET 设置密钥
  secret: ${JWT_SECRET}
  # 访问 Token 有效时间：30 分钟（毫秒）
  access-token-expiration: 1800000
  # 刷新 Token 有效时间：7 天（毫秒）
  refresh-token-expiration: 604800000

# ========== 评分权重配置 ==========
scoring:
  weights:
    normal:
      distance: 0.4
      battery: 0.25
      idle-time: 0.15
      health: 0.2
    peak-hour:
      distance: 0.2
      battery: 0.45
      idle-time: 0.1
      health: 0.25
    low-battery:
      distance: 0.15
      battery: 0.15
      idle-time: 0.45
      health: 0.25

# ========== WebSocket 配置 ==========
websocket:
  allowed-origins:
    - "http://localhost:8080"
    - "http://localhost:3000"

# ========== 日志配置 ==========
logging:
  level:
    root: INFO
    com.studyback.smartfleet: DEBUG
